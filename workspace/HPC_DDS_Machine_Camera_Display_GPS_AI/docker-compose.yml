services:
  app:
    image: "edupopcornsar/pc-linux:R2011-v251031-raspi"
    container_name: "${CONTAINER_NAME:-AP_AUTOSAR}"
    shm_size: "4g"
    stdin_open: true # equivalent to -i
    tty: true # equivalent to -t
    environment:
      - TZ=Asia/Ho_Chi_Minh

    # --- Network Configuration (Gán IP tĩnh tại đây) ---
    networks:
      para_net:
        ipv4_address: "10.10.0.14"
    ports:
      - "8022:22"

    # --- Mount camera (optional) ---
    # Uncomment the two lines below if you need webcam access inside the container
    devices:
      - "${CAMERA_DEV:-/dev/video0}:${CAMERA_DEV:-/dev/video0}"

      # --- Arduino (UNO/ESP32/...), insert arduino first ---
      # - /dev/ttyACM0:/dev/ttyACM0

      # --- STM32 (USB-UART or USB-CDC), insert stm32 second ---
      # - /dev/ttyACM1:/dev/ttyACM1

      # If STM32 uses CH340 UART adapter or FTDI, change to /dev/ttyUSBx
      # - /dev/ttyUSB0:/dev/ttyUSB0

      # --- Optional: ST-Link debug (USB raw) ---
      # - /dev/bus/usb:/dev/bus/usb

    group_add:
      - "${VIDEO_GID:-44}" # video group
      - "${DIALOUT_GID:-20}" # serial /dev/tty*
      - "${PLUGDEV_GID:-46}" # USB raw

    # --- Volumes (optional) ---
    volumes:
      - ./:/root/workspace

networks:
  para_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "10.10.0.0/24"
          gateway: "10.10.0.1"
